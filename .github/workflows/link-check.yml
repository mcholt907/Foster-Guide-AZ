name: Link Check
on:
  schedule:
    - cron: "0 6 * * 0" # Every Sunday at 6:00 UTC
  workflow_dispatch: # Manual trigger
  pull_request:
    paths:
      - "web/src/data/*.ts"
      - "server/src/data/*.ts"

permissions:
  issues: write
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract URLs from data files
        id: extract
        run: |
          # Extract all URLs from TypeScript data files
          grep -rhoP '(?:url|website):\s*"(https?://[^"]+)"' \
            web/src/data/*.ts \
            server/src/data/*.ts \
            | sed 's/.*"\(http[^"]*\)".*/\1/' \
            | sort -u > /tmp/urls.txt
          echo "Found $(wc -l < /tmp/urls.txt) unique URLs"
          cat /tmp/urls.txt

      - name: Check Links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --verbose
            --no-progress
            --timeout 15
            --max-concurrency 5
            --max-retries 3
            --accept 200,301,302
            --exclude "^tel:|^sms:|^mailto:|^https://www.ssa.gov"
            --user-agent "Mozilla/5.0 (compatible; FosterHubAZ-LinkChecker/1.0)"
            /tmp/urls.txt
          fail: true

      - name: Create Issue on Failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 Broken links found in resource data"
          content-filepath: ./lychee/out.md
          labels: |
            content-freshness
            broken-links
            auto-detected
