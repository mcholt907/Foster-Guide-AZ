name: Freshness Report
on:
  schedule:
    - cron: "0 9 1 * *" # 1st of every month at 9:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tsx
        run: npm install -g tsx

      - name: Generate freshness report
        run: npx tsx scripts/generate-freshness-report.ts

      - name: Commit report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/freshness-report.md
          git diff --staged --quiet || git commit -m "docs: update monthly content freshness report [skip ci]"
          git push
